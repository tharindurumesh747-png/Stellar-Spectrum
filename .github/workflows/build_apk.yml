name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld \
            libltdl-dev libgdbm-dev \
            libexpat1-dev \
            libncurses5-dev \
            liblzma-dev \
            libbz2-dev \
            libmpdec-dev \
            tk-dev \
            uuid-dev

      - name: Set correct JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH
          /usr/lib/jvm/temurin-17-jdk-amd64/bin/java -version

      - name: Fix sdkmanager path
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
                 /usr/local/lib/android/sdk/tools/bin/sdkmanager
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
                 /usr/local/lib/android/sdk/tools/bin/avdmanager

      - name: Accept SDK licenses
        run: |
          yes | JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64 \
            /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true
          JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64 \
            /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython>=0.29,<3"
          pip install "sh>=2,<3"
          pip install buildozer==1.5.0

      - name: Symlink SDK into buildozer path
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf /usr/local/lib/android/sdk \
            ~/.buildozer/android/platform/android-sdk
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Restore buildozer cache
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v16-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v16-

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
