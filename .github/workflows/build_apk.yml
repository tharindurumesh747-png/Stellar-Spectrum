name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld

      - name: Install buildozer and p4a
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython>=0.29,<3"
          pip install "sh>=1.14,<2"
          pip install python-for-android==2023.9.16
          pip install buildozer==1.5.0

      - name: Setup Android SDK and NDK paths
        run: |
          # Use the pre-installed SDK/NDK on the GitHub runner
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

          # Point buildozer to use existing SDK
          mkdir -p ~/.buildozer/android/platform
          ln -sf /usr/local/lib/android/sdk \
            ~/.buildozer/android/platform/android-sdk

          # Use NDK 27 that's already installed
          NDK_PATH=/usr/local/lib/android/sdk/ndk/27.3.13750724
          ln -sf $NDK_PATH \
            ~/.buildozer/android/platform/android-ndk-r27c
          echo "ANDROIDNDK=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK linked: $(ls ~/.buildozer/android/platform/)"

      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" 2>/dev/null || true

      - name: Restore buildozer cache
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v13-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
