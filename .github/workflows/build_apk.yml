name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Block Python 3.14 completely
        run: |
          # Remove or hide Python 3.14 so nothing can use it
          sudo rm -f /usr/bin/python3.14 2>/dev/null || true
          sudo rm -f /usr/local/bin/python3.14 2>/dev/null || true
          # Force all python3 calls to use 3.10
          sudo ln -sf /opt/hostedtoolcache/Python/3.10.20/x64/bin/python3.10 /usr/local/bin/python3
          sudo ln -sf /opt/hostedtoolcache/Python/3.10.20/x64/bin/python3.10 /usr/local/bin/python
          sudo ln -sf /opt/hostedtoolcache/Python/3.10.20/x64/bin/python3.10 /usr/bin/python3
          sudo ln -sf /opt/hostedtoolcache/Python/3.10.20/x64/bin/python3.10 /usr/bin/python
          # Verify
          python --version
          python3 --version
          which python3
          ls /usr/bin/python* 2>/dev/null
          ls /usr/local/bin/python* 2>/dev/null

      - name: Create swap space
        run: |
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install ALL build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential \
            git zip unzip wget curl \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld \
            libltdl-dev libgdbm-dev \
            libexpat1-dev libncurses5-dev \
            liblzma-dev libmpdec-dev \
            tk-dev uuid-dev \
            libncursesw5-dev \
            xz-utils patchelf nasm

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(update-alternatives --list java | grep java-17 | head -1)
          JAVA_HOME=$(dirname $(dirname $JAVA_PATH))
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          $JAVA_HOME/bin/java -version

      - name: Fix sdkmanager path
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
                 /usr/local/lib/android/sdk/tools/bin/sdkmanager
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
                 /usr/local/lib/android/sdk/tools/bin/avdmanager

      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython>=0.29,<3"
          pip install "sh>=2,<3"
          pip install buildozer==1.5.0

      - name: Symlink SDK into buildozer path
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf /usr/local/lib/android/sdk \
            ~/.buildozer/android/platform/android-sdk
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Restore buildozer cache
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v19-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v19-

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
