name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl \
            openjdk-17-jdk \
            autoconf automake libtool \
            libffi-dev libssl-dev \
            libltdl-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libgdbm-dev \
            libbz2-dev \
            libreadline-dev \
            build-essential \
            ccache \
            lld \
            cmake \
            pkg-config \
            python3-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v2-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug 2>&1 | tail -200
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null
          find bin/ -name "*.apk" 2>/dev/null || echo "No APK in bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Build result
        if: always()
        run: |
          echo "=== Build Complete ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ folder not found"
