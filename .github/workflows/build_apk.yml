name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Python tools with correct versions
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install "sh>=1.10,<2.0"
          pip install python-for-android==2024.1.21
          pip install buildozer==1.5.0
          # Force Python 3.10 as default
          sudo ln -sf $(which python3.10) /usr/local/bin/python3
          sudo ln -sf $(which python3.10) /usr/local/bin/python
          python --version
          python3 --version
          # Verify sh version
          python -c "import sh; print('sh version:', sh.__version__)"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: stellar-build-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            stellar-build-v4-

      - name: Pre-download Android NDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          NDK_ZIP="$HOME/.buildozer/android/platform/android-ndk-r25b-linux.zip"
          if [ ! -f "$NDK_ZIP" ]; then
            echo "Downloading NDK..."
            for i in 1 2 3; do
              wget -q --timeout=120 --tries=3 \
                https://dl.google.com/android/repository/android-ndk-r25b-linux.zip \
                -O "$NDK_ZIP" && echo "NDK downloaded OK" && break
              echo "Retry $i failed, waiting..."
              sleep 10
            done
          else
            echo "NDK already cached"
          fi
          ls -lh "$NDK_ZIP" 2>/dev/null || echo "NDK download failed"

      - name: Build APK
        run: |
          python3.10 -m buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ACCEPT_SDK_LICENCE: y

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
