name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Python tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "sh>=1.10,<2.0"
          pip install cython==0.29.33
          pip install python-for-android==2023.2.14
          pip install buildozer==1.5.0

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: stellar-build-v5-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            stellar-build-v5-

      - name: Pre-download NDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          NDK_ZIP="$HOME/.buildozer/android/platform/android-ndk-r25b-linux.zip"
          if [ ! -f "$NDK_ZIP" ]; then
            for i in 1 2 3; do
              wget -q --timeout=120 \
                https://dl.google.com/android/repository/android-ndk-r25b-linux.zip \
                -O "$NDK_ZIP" && break
              sleep 15
            done
          fi

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ACCEPT_SDK_LICENCE: y

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
