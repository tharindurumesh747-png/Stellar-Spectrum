name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential \
            git zip unzip wget \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            autoconf automake libtool \
            cmake pkg-config ccache lld \
            libltdl-dev libgdbm-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython>=0.29,<3"
          pip install "sh>=2,<3"
          pip install buildozer==1.2.0

      - name: Download and install NDK manually
        run: |
          NDK_DIR=~/.buildozer/android/platform/android-ndk-r25b
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading NDK..."
            mkdir -p ~/.buildozer/android/platform
            wget --tries=5 --timeout=300 --progress=dot:giga \
              https://dl.google.com/android/repository/android-ndk-r25b-linux.zip \
              -O /tmp/ndk.zip
            echo "Unzipping NDK..."
            unzip -q /tmp/ndk.zip -d ~/.buildozer/android/platform/
            echo "NDK installed at: $NDK_DIR"
            ls -la ~/.buildozer/android/platform/
          else
            echo "NDK already exists"
          fi

      - name: Patch buildozer to skip NDK download
        run: |
          # Find buildozer android target file
          BFILE=$(python -c "import buildozer.targets.android as a; print(a.__file__)")
          echo "Patching: $BFILE"
          # Replace the NDK download URL check so it uses our pre-installed NDK
          sudo sed -i 's/android-ndk-r25b-linux-x86_64.zip/android-ndk-r25b-linux.zip/g' "$BFILE"
          echo "Patch applied"
          grep "android-ndk" "$BFILE" | head -5

      - name: Restore buildozer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v12-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v12-

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lah bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
