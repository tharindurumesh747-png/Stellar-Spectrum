name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install all dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libbz2-dev \
            libreadline-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            pkg-config \
            ccache \
            lld \
            libltdl-dev \
            libgdbm-dev \
            libnss3-dev \
            libexpat1-dev \
            libmpdec-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install "sh>=2,<3"
          pip install "cython>=0.29,<3"
          pip install buildozer==1.5.0

      - name: Restore buildozer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v9-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v9-

      - name: Build APK
        run: |
          buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find APK
        if: always()
        run: |
          echo "=== All APK files ==="
          find / -name "*.apk" 2>/dev/null | grep -v proc || echo "None found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
