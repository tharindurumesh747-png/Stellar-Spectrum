name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            libffi-dev libssl-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libgdbm-dev \
            build-essential \
            ccache \
            lld

      - name: Set up Java 17
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Cache Buildozer global directory
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.33

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find and rename APK
        run: |
          APK=$(find bin/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" bin/stellar-spectrum-debug.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: Stellar-Spectrum-APK
          path: bin/stellar-spectrum-debug.apk
          retention-days: 30

      - name: Show build success
        run: |
          echo "✅ BUILD COMPLETE!"
          echo "📦 APK ready to download from Actions > Artifacts"
          ls -lh bin/*.apk
