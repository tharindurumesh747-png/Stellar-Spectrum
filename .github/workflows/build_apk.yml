name: Build Stellar Spectrum APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            libbz2-dev libreadline-dev \
            libgdbm-dev \
            zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            cmake pkg-config \
            lld ccache

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache .buildozer in workspace
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-workspace-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: List bin folder
        if: always()
        run: |
          echo "=== bin/ contents ==="
          ls -lah bin/ 2>/dev/null || echo "bin/ not found"
          echo "=== Finding all APKs ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stellar-Spectrum-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
